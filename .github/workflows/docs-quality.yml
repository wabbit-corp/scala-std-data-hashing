# Generated by app-wabbit-dev setup (repo docs workflow). Do not edit by hand.
name: Docs Quality

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0


      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"




      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build repository docs site
        run: python3 scripts/build_repo_docs_site.py --mode quality --output-dir "$RUNNER_TEMP/pages-site"
