name: Docs Quality

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle


      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and generate Dokka docs
        run: ./gradlew --no-daemon build dokkaGeneratePublicationHtml
